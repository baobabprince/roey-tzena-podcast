name: X-Radio Digest (Cloud Automation)

on:
  push:
    branches: [ main, master ]
  schedule:
    # 07:00 and 17:00 IST (UTC+2) -> 05:00 and 15:00 UTC
    - cron: '0 5 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch: # Allow manual run

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Check Secrets
        run: |
          if [ -z "${{ secrets.X_AUTH_TOKEN }}" ]; then echo "Missing X_AUTH_TOKEN"; exit 1; fi
          if [ -z "${{ secrets.X_CT0 }}" ]; then echo "Missing X_CT0"; exit 1; fi
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then echo "Missing GEMINI_API_KEY"; exit 1; fi
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then echo "Missing GCP_SA_KEY"; exit 1; fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r python/requirements.txt

      - name: Run Pipeline
        id: run_pipeline
        env:
            X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
            X_CT0: ${{ secrets.X_CT0 }}
            X_USERNAME: ${{ secrets.X_USERNAME }}
            X_PASSWORD: ${{ secrets.X_PASSWORD }}
            X_EMAIL: ${{ secrets.X_EMAIL }}
            X_TOTP_SECRET: ${{ secrets.X_TOTP_SECRET }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
            APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
            APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
            GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python python/main.py

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: success() && steps.run_pipeline.outputs.skipped != 'true'
        with:
          tag_name: ${{ steps.run_pipeline.outputs.tag_name }}
          files: digest_*.mp3
          body: "Daily X-Radio Digest generated by AI."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push RSS Update
        if: success() && steps.run_pipeline.outputs.skipped != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rss.xml episodes_db.json
          git commit -m "Update RSS feed [skip ci]" || echo "No changes to commit"
          git push origin master
